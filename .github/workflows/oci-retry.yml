name: OCI Instance Retry
on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:
concurrency:
  group: oci-retry
  cancel-in-progress: false
jobs:
  create-instance:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      actions: write
      contents: read
    env:
      GH_TOKEN: ${{ github.token }}
      OCI_CLI_SUPPRESS_FILE_PERMISSIONS_WARNING: "True"
    steps:
      - name: OCI CLI 설치
        run: pip install oci-cli --quiet
      - name: OCI 인증 설정
        run: |
          mkdir -p ~/.oci
          echo "${{ secrets.OCI_PRIVATE_KEY }}" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem
          cat > ~/.oci/config << EOF
          [DEFAULT]
          user=${{ secrets.OCI_USER_OCID }}
          fingerprint=${{ secrets.OCI_FINGERPRINT }}
          tenancy=${{ secrets.OCI_TENANCY_OCID }}
          region=${{ secrets.OCI_REGION }}
          key_file=/home/runner/.oci/oci_api_key.pem
          EOF
          chmod 600 ~/.oci/config
          echo "✅ OCI 인증 설정 완료"
      - name: OCI CLI 인증 테스트
        run: |
          if oci iam region list >/dev/null 2>&1; then
            echo "✅ 인증 정상"
          else
            echo "❌ 인증 실패"
            exit 1
          fi
      - name: 이미 생성됐는지 확인 (가드)
        run: |
          COMP="${{ secrets.OCI_TENANCY_OCID }}"
          COUNT=$(oci compute instance list --compartment-id "$COMP" \
            --query "length(data[?\"lifecycle-state\" != 'TERMINATED'])" \
            --raw-output 2>/dev/null || echo 0)
          [ -z "$COUNT" ] && COUNT=0
          echo "현재 살아있는 인스턴스 수: $COUNT"
          if [ "$COUNT" -gt 0 ] 2>/dev/null; then
            echo "✅ 이미 인스턴스가 존재 → 재시도 중단 및 워크플로 비활성화"
            gh workflow disable "OCI Instance Retry" || echo "(비활성화 권한 없음 - 수동으로 꺼주세요)"
            exit 0
          fi
          echo "생성된 인스턴스 없음 → 재시도 진행"
      - name: ORM Apply Job 실행
        run: |
          echo "시도 시작: $(date)"
          JOB_JSON=$(oci resource-manager job create-apply-job \
            --stack-id "${{ secrets.OCI_STACK_ID }}" \
            --execution-plan-strategy AUTO_APPROVED \
            2>&1)
          if echo "$JOB_JSON" | grep -q "ServiceError"; then
            echo "❌ Job 생성 실패:"
            echo "$JOB_JSON" | grep -i "message"
            exit 1
          fi
          JOB_ID=$(echo "$JOB_JSON" | grep '"id"' | head -1 | awk -F'"' '{print $4}')
          echo "✅ Apply Job 생성 완료"
          for i in $(seq 1 40); do
            sleep 20
            STATUS=$(oci resource-manager job get \
              --job-id "$JOB_ID" \
              --query "data.\"lifecycle-state\"" \
              --raw-output)
            echo "  [$(date '+%H:%M:%S')] 상태: $STATUS"
            if [ "$STATUS" = "SUCCEEDED" ]; then
              echo "🎉 인스턴스 생성 성공!"
              echo "재시도 중단을 위해 워크플로를 비활성화합니다."
              gh workflow disable "OCI Instance Retry" || echo "(비활성화 권한 없음 - 수동으로 꺼주세요)"
              exit 0
            elif [ "$STATUS" = "FAILED" ] || [ "$STATUS" = "CANCELED" ]; then
              echo "❌ 이번 시도 실패. 실패 원인:"
              oci resource-manager job get-job-logs-content \
                --job-id "$JOB_ID" 2>&1 \
                | grep -iE "capacity|error|limit|denied|quota|out of host" \
                || echo "(키워드 미발견 - 전체 로그는 OCI 콘솔에서 확인)"
              echo "10분 후 자동 재시도됩니다."
              exit 1
            fi
          done
          echo "⏱️ 시간 내 종료 상태 미확인."
